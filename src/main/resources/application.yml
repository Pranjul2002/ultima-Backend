spring:
  application:
    name: edutech-backend

  jpa:
    hibernate:
      ddl-auto: validate          # NEVER use "update" in production — use Flyway/Liquibase
    show-sql: false
    open-in-view: false           # Avoid LazyInitializationException anti-pattern
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25          # Batch inserts for performance

  # Jackson global settings
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  shutdown: graceful              # Drain requests before stopping
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: never        # Never leak stack traces to clients
    include-stacktrace: never
    include-binding-errors: never

# JWT — always injected via environment variable, no hardcoded fallback in prod
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: 86400000

# Graceful shutdown timeout
spring.lifecycle.timeout-per-shutdown-phase: 30s

logging:
  level:
    root: WARN
    com.edutech: INFO
    org.springframework.security: WARN


# Cookie settings for HttpOnly JWT auth.
# These values are read by AuthController.
#
# cookie.secure   — set to "false" locally (HTTP), "true" in prod (HTTPS).
#                   Override via env var: COOKIE_SECURE=false (dev) / true (prod)
# cookie.max-age  — seconds until the cookie expires.
#                   Should match jwt.expiration (ms) / 1000.
#                   Default 86400 = 24 hours.

cookie:
  secure: ${COOKIE_SECURE:true}
  max-age: ${COOKIE_MAX_AGE:86400}


# ── application-dev.yml override ─────────────────────────────────────────────
# Add this to application-dev.yml so the cookie works over plain HTTP locally:
#
# cookie:
#   secure: false


# ── Environment variables summary ─────────────────────────────────────────────
#
# Production (Render / Railway):
#   COOKIE_SECURE=true          (default — HTTPS only)
#   COOKIE_MAX_AGE=86400        (optional — 24 h default)
#   FRONTEND_URL=https://your-app.vercel.app
#
# Local dev:
#   COOKIE_SECURE=false         (HTTP, no SSL)
#   FRONTEND_URL=http://localhost:3000  (default)