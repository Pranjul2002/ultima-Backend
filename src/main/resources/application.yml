spring:
  application:
    name: ultima-backend

  # JPA settings shared across all environments
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Server port
server:
  port: ${PORT:8080}

# JWT config — values come from environment variables
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: 86400000