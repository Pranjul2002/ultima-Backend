spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    # ↑ building JDBC URL from individual Railway variables
    #   PGHOST     = monorail.proxy.rlwy.net
    #   PGPORT     = 12345
    #   PGDATABASE = railway
    #   Result: jdbc:postgresql://monorail.proxy.rlwy.net:12345/railway

    username: ${DB_USER}
    # ↑ postgres

    password: ${DB_PASSWORD}
    # ↑ the auto-generated secure password

    driver-class-name: org.postgresql.Driver

    # Connection pool settings for production
    hikari:
      maximum-pool-size: 5
      # ↑ Railway free tier has connection limits
      #   keep pool small to stay within limits
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
      # ↑ auto-creates tables on Railway PostgreSQL
      #   just like it did locally
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB

