spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Validate connections before use — catches stale connections after DB restarts
      connection-test-query: SELECT 1
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: validate          # Safe: never mutates schema automatically
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB

groq:
  api-key: ${GROQ_API_KEY}       # Required — set in Render/Railway dashboard
  base-url: https://api.groq.com/openai
  model: llama-3.3-70b-versatile

logging:
  level:
    root: WARN
    com.edutech: INFO